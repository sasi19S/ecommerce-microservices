# Application
spring.application.name=auth-service
server.port=8080

# Logging (helps debugging in Kubernetes logs)
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG

# JWT (example secret)
jwt.secret=my-super-secret-key-which-is-at-least-32-characters-long
jwt.expiration=3600000

# Disable default Spring Security login page
spring.security.user.name=admin
spring.security.user.password=admin

# Optional: allow actuator health check (good for Kubernetes)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always